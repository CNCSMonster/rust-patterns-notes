name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    concurrency:
      group: "deploy"
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mdbook-zh-search
        run: |
          cargo install --git https://github.com/cncsmonster/mdbook-zh-search mdbook

      - name: Build book
        run: |
          cd rust-patterns-notes
          mdbook-zh-search build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./rust-patterns-notes/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
